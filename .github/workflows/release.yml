# 发版流水线：tag push 触发 → 三平台并行构建 → 合并 → 发 GitHub Release + 推 R2
#
# 触发方式：`npm run release 1.0.4` 本地推 tag，或者 Actions 页手动 dispatch。
# 所有 secrets 放在 `release` environment 里；workflow 首次运行会停在
# Waiting for review，到 Actions 页面点 Approve 才开始跑。

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (如 v1.0.4，必须已经存在)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------
  # Job 1：macOS Apple Silicon 构建 + 公证
  # ------------------------------------------------------------------
  build-macos-arm64:
    name: Build · macOS arm64
    runs-on: macos-latest
    environment: release
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          set -e
          CERT_PATH=$RUNNER_TEMP/build-cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install dependencies
        run: npm ci

      - name: Install bundled runtime CLIs (opencode / codex / gemini)
        # 固定版本到本地测试过的同版本，避免 CI 拉到更新版带来的行为差异；
        # 想升级时改这里并同步本地再发版。
        run: npm install -g opencode-ai@1.2.27 @openai/codex@0.118.0 @google/gemini-cli@0.34.0

      - name: Prepare desktop runtime (sign bundled node binaries)
        run: node scripts/prepare-desktop-runtime.mjs --sign

      - name: Build Tauri bundle (app)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npx tauri build --target aarch64-apple-darwin --bundles app

      - name: Fix bundled signatures
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: node scripts/fix-bundle-signatures.mjs

      - name: Notarize & create DMG + updater tarball
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: node scripts/package-and-notarize.mjs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: src-tauri/target/release/bundle/dist/*
          if-no-files-found: error
          retention-days: 7

  # ------------------------------------------------------------------
  # Job 2：macOS Intel 构建 + 公证（只能用 macos-13，它还有 x86_64 硬件）
  # ------------------------------------------------------------------
  build-macos-x64:
    name: Build · macOS x64
    runs-on: macos-13
    environment: release
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          set -e
          CERT_PATH=$RUNNER_TEMP/build-cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install dependencies
        run: npm ci

      - name: Install bundled runtime CLIs (opencode / codex / gemini)
        # 固定版本到本地测试过的同版本，避免 CI 拉到更新版带来的行为差异；
        # 想升级时改这里并同步本地再发版。
        run: npm install -g opencode-ai@1.2.27 @openai/codex@0.118.0 @google/gemini-cli@0.34.0

      - name: Prepare desktop runtime (sign bundled node binaries)
        run: node scripts/prepare-desktop-runtime.mjs --sign

      - name: Build Tauri bundle (app)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npx tauri build --target x86_64-apple-darwin --bundles app

      - name: Fix bundled signatures
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: node scripts/fix-bundle-signatures.mjs

      - name: Notarize & create DMG + updater tarball
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: node scripts/package-and-notarize.mjs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: src-tauri/target/release/bundle/dist/*
          if-no-files-found: error
          retention-days: 7

  # ------------------------------------------------------------------
  # Job 3：Windows x64 构建
  # ------------------------------------------------------------------
  build-windows:
    name: Build · Windows x64
    runs-on: windows-latest
    environment: release
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Install bundled runtime CLIs (opencode / codex / gemini)
        # 固定版本到本地测试过的同版本，避免 CI 拉到更新版带来的行为差异；
        # 想升级时改这里并同步本地再发版。
        run: npm install -g opencode-ai@1.2.27 @openai/codex@0.118.0 @google/gemini-cli@0.34.0

      - name: Prepare desktop runtime
        run: node scripts/prepare-desktop-runtime.mjs

      - name: Build Tauri bundle (NSIS)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --config src-tauri/tauri.windows.conf.json --bundles nsis

      - name: Sign installer & generate latest.json fragment
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: node scripts/package-windows-updater.mjs

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p windows-out
          cp src-tauri/target/release/bundle/nsis/*.exe windows-out/ || true
          cp src-tauri/target/release/bundle/nsis/*.sig windows-out/ || true
          cp src-tauri/target/release/bundle/nsis/latest.json windows-out/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: windows-out/*
          if-no-files-found: error
          retention-days: 7

  # ------------------------------------------------------------------
  # Job 4：合并 + 发 GitHub Release + 推 R2 + Purge CF
  # ------------------------------------------------------------------
  publish:
    name: Publish
    needs: [build-macos-arm64, build-macos-x64, build-windows]
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install minimal deps (aws-sdk)
        run: npm ci --omit=optional

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve tag & version
        id: meta
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Extract release notes from tag annotation (fallback to notes/<tag>.md)
          NOTES_FILE=release-notes.md
          if git rev-parse -q --verify "refs/tags/$TAG" > /dev/null 2>&1; then
            git tag -l --format='%(contents)' "$TAG" > "$NOTES_FILE"
          fi
          if [ ! -s "$NOTES_FILE" ] && [ -f "notes/$TAG.md" ]; then
            cp "notes/$TAG.md" "$NOTES_FILE"
          fi
          if [ ! -s "$NOTES_FILE" ]; then
            echo "DesignCode $TAG" > "$NOTES_FILE"
          fi
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Compose latest.json (GitHub + R2 variants)
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          RELEASE_NOTES_FILE: ${{ steps.meta.outputs.notes_file }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/ci-compose-latest-json.mjs

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.msi" -o \
            -name "*-setup.exe" -o \
            -name "*.tar.gz" -o \
            -name "*.nsis.zip" -o \
            -name "*.sig" -o \
            -name "*.AppImage" \
          \) -exec cp {} release-assets/ \;
          cp dist-release/latest.github.json release-assets/latest.json
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: DesignCode ${{ steps.meta.outputs.tag }}
          body_path: ${{ steps.meta.outputs.notes_file }}
          draft: false
          prerelease: false
          files: release-assets/*
          fail_on_unmatched_files: true

      - name: Upload mirror to R2
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: node scripts/ci-upload-r2.mjs

      - name: Purge Cloudflare cache for latest.json
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
        run: node scripts/ci-purge-cf.mjs

      - name: Summary
        run: |
          echo "### ✅ Release ${{ steps.meta.outputs.tag }} published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- GitHub: https://github.com/${{ github.repository }}/releases/tag/${{ steps.meta.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- R2: ${{ secrets.R2_PUBLIC_BASE }}/latest.json" >> "$GITHUB_STEP_SUMMARY"
